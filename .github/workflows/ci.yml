name: CI
on:
  pull_request:
  push:
    branches: [main]
jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with: { path: grab-seller-product }
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://npm.pkg.github.com'
          scope: '@khinemyaezin'
          cache: npm
          cache-dependency-path: grab-seller-product/package-lock.json
      - run: npm ci
        working-directory: grab-seller-product
      - run: npm run typecheck && npm run build
        working-directory: grab-seller-product