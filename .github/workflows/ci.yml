name: CI
on:
  pull_request:
  push:
    branches: [main]
jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with: { path: seller-product-mfe }
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          scope: '@grab'
          cache: npm
          cache-dependency-path: seller-product-mfe/package-lock.json
      - run: npm ci
        working-directory: seller-product-mfe
      - run: npm run typecheck && npm test && npm run build
        working-directory: seller-product-mfe
      - run: node -e "const m=require('./dist/mf-manifest.json');if(!JSON.stringify(m).includes('./Routes'))process.exit(1)"
        working-directory: seller-product-mfe
